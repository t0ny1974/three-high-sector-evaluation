name: test

on:
  push:
  pull_request:

jobs:
  core-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run core tests
        env:
          PYTHONPATH: src
        run: python -m unittest discover -s tests -v
